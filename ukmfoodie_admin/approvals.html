<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stall Approvals - UKMFoodie Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="auth_check.js"></script>
    <style>
        :root {
            --primary-yellow: #FFC93C;
            --sidebar-bg: #D1D5DB; /* Back to UI Admin color */
            --bg-light: #E5E7EB;
            --text-dark: #1F2937;
            --text-gray: #6B7280;
            --white: #FFFFFF;
            --green-btn: #22C55E;
            --red-btn: #EF4444;
            --border-color: #D1D5DB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background-color: var(--bg-light); height: 100vh; overflow: hidden; }

        /* === SIDEBAR (Size matched with Seller, Color from Admin UI) === */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .logo-box {
            width: 35px;
            height: 35px;
            background-color: var(--primary-yellow);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .nav-links { list-style: none; padding: 0 15px; margin-top: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .nav-item i { margin-right: 15px; font-size: 18px; }
        .nav-item.active { background-color: var(--primary-yellow); }
        .nav-item:hover:not(.active) { background-color: rgba(0,0,0,0.05); }

        /* === MAIN CONTENT === */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; height: 100vh; }
        
        .top-navbar { 
            background-color: var(--white); 
            padding: 15px 30px; 
            font-weight: 500; 
            color: var(--text-gray); 
            font-size: 14px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid var(--border-color); 
        }

        .content-wrapper { padding: 40px; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 30px; }

        .card {
            background-color: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 10px; font-size: 13px; color: var(--text-gray); border-bottom: 1px solid #F3F4F6; }
        td { padding: 20px 10px; font-size: 14px; color: var(--text-dark); border-bottom: 1px solid #F3F4F6; vertical-align: middle; }

        .location-tag {
            background-color: #F3F4F6;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-gray);
            display: block;
            margin-bottom: 5px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-map-btn {
            background-color: #3B82F6;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .contact-info { font-size: 12px; color: var(--text-gray); }
        .contact-info i { width: 15px; margin-right: 5px; }

        .action-btns { display: flex; gap: 8px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-approve { 
            background-color: #10B981; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .btn-approve:hover { 
            background-color: #059669; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -1px rgba(16, 185, 129, 0.3);
        }

        .btn-reject { 
            background-color: #EF4444; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }
        .btn-reject:hover { 
            background-color: #DC2626; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -1px rgba(239, 68, 68, 0.3);
        }

        .badge {
            background-color: #EF4444;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
            display: none;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
        }

        /* Modal for map */
        #mapModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
        }
        #miniMap { height: 400px; width: 100%; border-radius: 12px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-btn { cursor: pointer; font-size: 20px; color: var(--text-gray); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-box"><i class="fa-solid fa-utensils"></i></div>
            UKMFoodie
        </div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-table-cells-large"></i> Overview
            </a>
            <a href="users.html" class="nav-item">
                <i class="fa-solid fa-users"></i> User Management
            </a>
            <a href="approvals.html" class="nav-item active">
                <i class="fa-solid fa-store"></i> Stalls Approval
                <span class="badge" id="pendingBadge">0</span>
            </a>
        </nav>
        <div style="margin-top: auto; padding: 15px;">
            <a href="#" onclick="logoutAdmin()" class="nav-item" style="background-color: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2);">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-navbar">
            UKMFoodie Admin Portal
        </div>
        
        <div class="content-wrapper">
            <h1 class="page-title">Pending Stall Approvals</h1>

            <div class="card">
                <table id="approvalsTable">
                    <thead>
                        <tr>
                            <th>Stall & Owner</th>
                            <th>Contact Info</th>
                            <th>Location</th>
                            <th>Registration Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="approvalsBody">
                        <tr><td colspan="5" class="empty-state">Loading pending requests...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Map Modal -->
    <div id="mapModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalStallName">Stall Location</h3>
                <i class="fa-solid fa-xmark close-btn" onclick="closeMap()"></i>
            </div>
            <div id="miniMap"></div>
        </div>
    </div>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="auth_check.js"></script>
    <script src="admin_notifications.js"></script>
    <script>
        let leafletMap;
        let leafletMarker;

        async function fetchPendingStalls() {
            try {
                const response = await fetch(`${API_BASE}/fetch_pending_stalls.php`);
                const result = await response.json();

                const tbody = document.getElementById('approvalsBody');

                if (result.status === 'success') {
                    if (result.data.length > 0) {
                        tbody.innerHTML = '';
                        result.data.forEach(stall => {
                            const date = new Date(stall.created_at).toLocaleDateString();
                            tbody.innerHTML += `
                                <tr>
                                    <td>
                                        <div style="font-weight: 700; color: var(--text-dark);">${stall.stall_name}</div>
                                        <div style="font-size: 12px; color: var(--text-gray);">Owner: ${stall.owner_name}</div>
                                    </td>
                                    <td>
                                        <div class="contact-info"><i class="fa-solid fa-phone"></i> ${stall.phone}</div>
                                        <div class="contact-info"><i class="fa-solid fa-envelope"></i> ${stall.email}</div>
                                    </td>
                                    <td>
                                        <span class="location-tag" title="${stall.address}">${stall.address || 'No address'}</span>
                                        <button class="mini-map-btn" onclick="openMap(${stall.latitude}, ${stall.longitude}, '${stall.stall_name}')">
                                            <i class="fa-solid fa-location-dot"></i> View Map
                                        </button>
                                    </td>
                                    <td>${date}</td>
                                    <td>
                                        <div class="action-btns">
                                            <button class="btn btn-approve" onclick="updateStatus(${stall.id}, 'Approved')">
                                                <i class="fa-solid fa-check"></i> Approve
                                            </button>
                                            <button class="btn btn-reject" onclick="updateStatus(${stall.id}, 'Rejected')">
                                                <i class="fa-solid fa-xmark"></i> Reject
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No pending approvals found.</td></tr>';
                    }
                }
            } catch (error) {
                console.error("Error fetching approvals:", error);
            }
        }

        function openMap(lat, lng, name) {
            document.getElementById('mapModal').style.display = 'flex';
            document.getElementById('modalStallName').innerText = name;
            
            if (!leafletMap) {
                leafletMap = L.map('miniMap').setView([lat, lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);
                leafletMarker = L.marker([lat, lng]).addTo(leafletMap);
            } else {
                leafletMap.setView([lat, lng], 16);
                leafletMarker.setLatLng([lat, lng]);
            }
            
            setTimeout(() => leafletMap.invalidateSize(), 200);
        }

        function closeMap() {
            document.getElementById('mapModal').style.display = 'none';
        }

        async function updateStatus(stallId, status) {
            if (!confirm(`Are you sure you want to ${status.toLowerCase()} this stall?`)) return;

            try {
                const response = await fetch(`${API_BASE}/update_stall_approval.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stall_id: stallId, status: status })
                });

                const result = await response.json();
                alert(result.message);
                if (result.status === 'success') {
                    fetchPendingStalls();
                }
            } catch (error) {
                alert("Failed to update status.");
            }
        }

        window.onload = fetchPendingStalls;
    </script>
</body>
</html>
