<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login - UKMFoodie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-yellow: #FFC93C;
            --bg-light: #F4F7F6;
            --text-dark: #1A1A1A;
            --text-gray: #888888;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('assets/login-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background-color: var(--primary-yellow);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            font-size: 24px;
            color: var(--text-dark);
        }

        .login-card h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #A9A9A9;
            font-size: 16px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 3px rgba(255, 201, 60, 0.1);
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-yellow);
            color: var(--text-dark);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 201, 60, 0.3);
        }

        .error-msg {
            color: #F1416C;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .footer-text a {
            color: var(--primary-yellow);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-admin-toggle {
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .btn-admin-toggle:hover { color: var(--text-dark); }
        .admin-mode .logo-box { background-color: var(--text-dark); color: var(--primary-yellow); }
        .admin-mode .btn-login { background-color: var(--text-dark); color: var(--primary-yellow); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-section">
            <div class="logo-box"><i class="fa-solid fa-utensils"></i></div>
            <h1>Seller Portal</h1>
            <p>Welcome back! Please login to your account.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="seller@ukm.edu.my" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Login to Portal</button>
            <div class="error-msg" id="errorMsg">Invalid email or password.</div>
        </form>

        <div class="footer-text">
            Don't have a stall? <a href="register.html">Register Your Stall</a>
        </div>

        <button type="button" class="btn-admin-toggle" onclick="toggleAdminMode()" id="adminToggleBtn">
            <i class="fa-solid fa-user-shield"></i> Login as Admin
        </button>
    </div>

    <script>
        const API_BASE = 'http://localhost/ukmfoodie_workspace/ukmfoodie_api';

        let isAdminMode = false;

        function toggleAdminMode() {
            isAdminMode = !isAdminMode;
            const card = document.querySelector('.login-card');
            const title = document.querySelector('h1');
            const subtitle = document.querySelector('.logo-section p');
            const loginBtn = document.getElementById('loginBtn');
            const toggleBtn = document.getElementById('adminToggleBtn');
            const footer = document.querySelector('.footer-text');
            const emailInput = document.getElementById('email');

            if (isAdminMode) {
                card.classList.add('admin-mode');
                title.innerText = 'Admin Portal';
                subtitle.innerText = 'Sign in to manage UKMFoodie platform.';
                loginBtn.innerText = 'Login as Admin';
                toggleBtn.innerHTML = '<i class="fa-solid fa-store"></i> Back to Seller Login';
                footer.style.opacity = '0';
                footer.style.pointerEvents = 'none';
                emailInput.placeholder = 'admin@gmail.com';
            } else {
                card.classList.remove('admin-mode');
                title.innerText = 'Seller Portal';
                subtitle.innerText = 'Welcome back! Please login to your account.';
                loginBtn.innerText = 'Login to Portal';
                toggleBtn.innerHTML = '<i class="fa-solid fa-user-shield"></i> Login as Admin';
                footer.style.opacity = '1';
                footer.style.pointerEvents = 'auto';
                emailInput.placeholder = 'seller@ukm.edu.my';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            errorMsg.style.display = 'none';
            loginBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${isAdminMode ? 'Verifying Admin...' : 'Authenticating...'}`;
            loginBtn.disabled = true;

            // Admin Login Logic (Hardcoded as requested)
            if (isAdminMode) {
                setTimeout(() => {
                    if (email === 'admin@gmail.com' && password === '123456') {
                        localStorage.setItem('admin_logged_in', 'true');
                        window.location.href = '../ukmfoodie_admin/dashboard.html';
                    } else {
                        errorMsg.innerText = "Invalid Admin credentials.";
                        errorMsg.style.display = 'block';
                        loginBtn.innerHTML = 'Login as Admin';
                        loginBtn.disabled = false;
                    }
                }, 800);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/login_seller.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Simpan data dalam localStorage
                    localStorage.setItem('seller_id', result.data.user_id);
                    localStorage.setItem('seller_name', result.data.fullname);
                    localStorage.setItem('stall_id', result.data.stall_id);
                    localStorage.setItem('stall_name', result.data.stall_name);
                    
                    // Redirect ke dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = result.message;
                    errorMsg.style.display = 'block';
                    loginBtn.innerHTML = 'Login to Portal';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                errorMsg.innerText = "Network error. Please check your connection.";
                errorMsg.style.display = 'block';
                loginBtn.innerHTML = 'Login to Portal';
                loginBtn.disabled = false;
            }
        });

        // Clear session if already logged out
        if (window.location.search.includes('logout=true')) {
            localStorage.clear();
        }
    </script>
</body>
</html>
