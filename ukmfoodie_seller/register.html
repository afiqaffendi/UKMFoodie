<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration - UKMFoodie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary-yellow: #FFC93C; --bg-light: #F4F7F6; --text-dark: #1A1A1A; --text-gray: #888888; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('assets/login-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .reg-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-box { width: 50px; height: 50px; background-color: var(--primary-yellow); border-radius: 12px; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; font-size: 24px; color: var(--text-dark); }
        h1 { font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
        p.subtitle { color: var(--text-gray); font-size: 14px; margin-bottom: 30px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #A9A9A9; font-size: 14px; }
        .form-control { width: 100%; padding: 12px 15px 12px 42px; border: 1px solid #E0E0E0; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary-yellow); box-shadow: 0 0 0 3px rgba(255, 201, 60, 0.1); }
        textarea.form-control { padding: 12px 15px; min-height: 80px; }

        #map { height: 200px; border-radius: 12px; border: 1px solid #E0E0E0; margin-top: 10px; }
        .map-hint { font-size: 11px; color: var(--text-gray); margin-top: 5px; display: block; }

        .btn-reg { width: 100%; background-color: var(--primary-yellow); color: var(--text-dark); border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 25px; }
        .btn-reg:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 201, 60, 0.3); }

        .footer-text { margin-top: 20px; font-size: 14px; color: var(--text-gray); }
        .footer-text a { color: var(--primary-yellow); text-decoration: none; font-weight: 600; }

        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="logo-box"><i class="fa-solid fa-store"></i></div>
        <h1>Register Your Stall</h1>
        <p class="subtitle">Join UKMFoodie and start growing your business.</p>

        <form id="regForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Full Name (Owner)</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="fullname" class="form-control" placeholder="Ahmad Bin Ali" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Stall Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shop"></i>
                        <input type="text" id="stall_name" class="form-control" placeholder="Gerai Pak Mat" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="text" id="phone" class="form-control" placeholder="0123456789" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="pakmat@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Stall Address</label>
                    <textarea id="address" class="form-control" placeholder="Fakulti Teknologi dan Sains Maklumat (FTSM), UKM Bangi..." required></textarea>
                </div>

                <div class="form-group full-width">
                    <label>Stall Location (Pin on Map)</label>
                    <div id="map"></div>
                    <span class="map-hint"><i class="fa-solid fa-circle-info"></i> Click on the map to set your stall's exact location.</span>
                    <input type="hidden" id="latitude" value="2.9289">
                    <input type="hidden" id="longitude" value="101.7801">
                </div>
            </div>

            <button type="submit" class="btn-reg" id="regBtn">Submit Registration Request</button>
        </form>

        <div class="footer-text">
            Already have a stall? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost/ukmfoodie_workspace/ukmfoodie_api';

        // Initialize Map
        let map = L.map('map').setView([2.9289, 101.7801], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let marker = L.marker([2.9289, 101.7801], { draggable: true }).addTo(map);

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('latitude').value = e.latlng.lat;
            document.getElementById('longitude').value = e.latlng.lng;
        });

        marker.on('dragend', function(e) {
            const pos = marker.getLatLng();
            document.getElementById('latitude').value = pos.lat;
            document.getElementById('longitude').value = pos.lng;
        });

        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const regBtn = document.getElementById('regBtn');
            const originalText = regBtn.innerHTML;
            
            regBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            regBtn.disabled = true;

            const payload = {
                fullname: document.getElementById('fullname').value,
                stall_name: document.getElementById('stall_name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value,
                latitude: document.getElementById('latitude').value,
                longitude: document.getElementById('longitude').value
            };

            try {
                const response = await fetch(`${API_BASE}/register_seller.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                alert(result.message);
                
                if (result.status === 'success') {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                alert("Failed to connect to server. Please try again.");
            } finally {
                regBtn.innerHTML = originalText;
                regBtn.disabled = false;
            }
        });

        // Small delay to fix map container issue
        setTimeout(() => map.invalidateSize(), 500);
    </script>
</body>
</html>
